# Turnkey toolchain declaration
# This demonstrates the full Buck2 + Nix integration with Go toolchain

[toolchains]
# Build tools
buck2 = {}

# Language toolchains (used by Buck2)
# Note: clang is automatically included via cxx's runtimeDependencies
go = {}

# Development utilities (not Buck2 toolchains)
nix = {}
beads = {}
beads_viewer = {}
jj = {}
