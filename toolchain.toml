# Turnkey toolchain declaration
# Uses versioned toolchain meta-packages from toolbox where possible

[toolchains]
# Build tools
buck2 = {}

# Language toolchains (versioned meta-packages from toolbox)
# Each bundles the compiler, LSP, linter, formatter, and related tools
rust-toolchain = {}      # rust, rust-analyzer, cargo-edit (cargo/clippy/rustfmt ship with rust)
go-toolchain = {}        # go, golangci-lint, gopls
python-toolchain = {}    # python, uv, ruff, pytest
typescript-toolchain = {} # typescript, nodejs, biome, bun
solidity-toolchain = {}  # solc, foundry

# Buck2-specific tools
reindeer = {}  # Generate Buck2 targets from Cargo.toml

# Documentation tools
mdbook = {}

# Data templating
jrsonnet = {}  # Jsonnet to JSON compiler (Rust implementation)

# Development utilities (not Buck2 toolchains)
nix = {}
beads = {}
beads-viewer = {}
jj = {}
tk = {}  # Turnkey CLI wrapper for buck2 with auto-sync
