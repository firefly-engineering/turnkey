# Sync configuration for tk
#
# This file defines staleness rules for tk sync. When source files
# change, the corresponding targets are regenerated.

# Go dependencies: go.mod + go.sum → go-deps.toml
[[deps]]
name = "go"
sources = ["go.mod", "go.sum"]
target = "go-deps.toml"
generator = ["godeps-gen", "--go-mod", "go.mod", "--go-sum", "go.sum", "--prefetch"]

# Rust dependencies: Cargo.toml + Cargo.lock → rust-deps.toml
[[deps]]
name = "rust"
sources = ["Cargo.toml", "Cargo.lock"]
target = "rust-deps.toml"
generator = ["rustdeps-gen", "--cargo-lock", "Cargo.lock"]

# Python dependencies: pyproject.toml → python-deps.toml
# Note: This runs the full uv lock → uv export → pydeps-gen pipeline
# uv lock and export write to files, pydeps-gen outputs to stdout
[[deps]]
name = "python"
sources = ["pyproject.toml"]
target = "python-deps.toml"
generator = ["sh", "-c", "uv lock >&2 && uv export --format pylock.toml -o pylock.toml >&2 && pydeps-gen --lock pylock.toml"]
