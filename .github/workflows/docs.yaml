name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yaml'

  # Allow manual trigger
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

# Grant GITHUB_TOKEN permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Build and assemble site
        run: |
          cat > /tmp/build-docs.sh <<'SCRIPT'
          set -euo pipefail

          user_out=$(tk build --show-output //docs/user-manual:user-manual 2>/dev/null | awk '{print $2}')
          dev_out=$(tk build --show-output //docs/developer-manual:developer-manual 2>/dev/null | awk '{print $2}')

          mkdir -p _site
          cp -r "$user_out" _site/user-manual
          cp -r "$dev_out" _site/developer-manual

          cat > _site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Turnkey Documentation</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
              a { display: block; margin: 12px 0; font-size: 1.2em; }
            </style>
          </head>
          <body>
            <h1>Turnkey Documentation</h1>
            <a href="user-manual/">User Manual</a>
            <a href="developer-manual/">Developer Manual</a>
          </body>
          </html>
          HTML
          SCRIPT
          chmod +x /tmp/build-docs.sh
          nix develop --impure -c bash /tmp/build-docs.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
