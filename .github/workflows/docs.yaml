name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yaml'

  # Allow manual trigger
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

# Grant GITHUB_TOKEN permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Build and assemble site
        run: |
          nix develop .#docs --impure -c bash -c '
            set -euo pipefail
            mkdir -p _site
            mdbook build docs/landing --dest-dir "$PWD/_site"
            mdbook build docs/user-manual --dest-dir "$PWD/_site/user-manual"
            mdbook build docs/developer-manual --dest-dir "$PWD/_site/developer-manual"
          '

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
