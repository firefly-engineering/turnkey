# Manual feature overrides for Rust dependencies
#
# Format:
#   [overrides]
#   crate-name = ["feature1", "feature2"]     # Complete replacement
#   crate-name = { add = ["feature"] }        # Add to computed features
#   crate-name = { remove = ["feature"] }     # Remove from computed features

[overrides]
# clap needs derive feature for our local Rust binaries that use #[derive(Parser)]
clap = { add = ["derive"] }

# chrono needs serde feature for DateTime<Utc> serialization in local crates
chrono = { add = ["serde"] }
