# Foundry configuration for solidity-hello example
# This is a minimal config for demonstration purposes.
# In a real project, you would configure remappings, optimizer settings, etc.

[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]

# Compiler settings
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# Testing settings
fuzz_runs = 256
