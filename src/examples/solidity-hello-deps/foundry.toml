# Foundry configuration for solidity-hello-deps example
# Demonstrates using external dependencies (OpenZeppelin, forge-std)

[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]

# Compiler settings
solc_version = "0.8.33"
optimizer = true
optimizer_runs = 200

# Testing settings
fuzz_runs = 256

# Dependencies (used by soldeps-gen to generate solidity-deps.toml)
[dependencies]
forge-std = "https://github.com/foundry-rs/forge-std@v1.8.0"

# Note: OpenZeppelin contracts would typically come from npm
# For this example, they're declared in package.json or directly here
