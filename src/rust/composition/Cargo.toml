[package]
name = "composition"
version = "0.1.0"
edition.workspace = true
description = "Composition backend trait for FUSE and symlink-based repository views"

[features]
default = []
fuse = ["dep:fuser", "dep:libc", "dep:log"]

[dependencies]
thiserror.workspace = true

# Optional FUSE support (Linux only)
fuser = { workspace = true, optional = true }
libc = { workspace = true, optional = true }
log = { workspace = true, optional = true }

[dev-dependencies]
tempfile.workspace = true
